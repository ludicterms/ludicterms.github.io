name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Defining these globally ensures they are injected into every single step, including react-snap
env:
  REACT_APP_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.REACT_APP_CONTENTFUL_ACCESS_TOKEN }}
  REACT_APP_CONTENTFUL_SPACE_ID: ${{ secrets.REACT_APP_CONTENTFUL_SPACE_ID }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository files first
    - uses: actions/checkout@v4
      with:
        persist-credentials: false

    # 2. Setup the Node.js environment
    - uses: actions/setup-node@v4
      with:
        node-version: '16'

    # 3. Configure Git credentials
    - run: git config --global user.email "${{ secrets.USER_EMAIL }}"
    - run: git config --global user.name "${{ secrets.USER_NAME }}"

    # 4. Install dependencies and run the build (including react-snap)
    - name: Build
      run: |
        npm install
        npm run build

    # 5. Push the build folder to the gh-pages branch
    - name: Deploy
      if: github.ref == 'refs/heads/main'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.ACCESS_TOKEN }} # Updated configuration key for v4
        BRANCH: gh-pages
        FOLDER: build

    # 6. Notify Discord if Build or Deploy fails
    - name: Notify Discord on failure
      if: failure()
      run: |
        curl -H "Content-Type: application/json" \
          -d "$(jq -n \
            --arg content "â Build or react-snap crashed on main branch. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{content: $content}')" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}